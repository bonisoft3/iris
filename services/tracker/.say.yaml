say:
  generate:
    rulemap:
      auto-cue: null
  build:
    do: "run-task bayt:build"
    use: "./tools.nu [run-task]"
  test:
    do: "run-task bayt:test"
    use: "./tools.nu [run-task]"
  launch:
    args: "--target services_tracker-launch"
  # Target dindbox (the runtime orchestrator) instead of integrate.
  # dindbox's entrypoint probes the host gateway IP and exports
  # DOCKER_HOST; its CMD invokes `bake services_tracker-ci`. ci's
  # Dockerfile RUN does the inner bake on integrate (BuildKit-cached);
  # integrate's RUN executes gradle integrationTest via dind.sh.
  integrate:
    args: "--target dindbox"
  # Goreleaser-OSS doesn't understand sayt's path-prefixed monorepo
  # tags (services/tracker/v0.2.1) — that's a pro feature. --snapshot
  # keeps goreleaser in dev mode (skips the strict tag-on-HEAD
  # validation), --clean wipes dist/ so re-runs are idempotent.
  # Matches CI's invocation in .github/workflows/ci.yml. Real
  # tag-push releases (refs/tags/*) drop --snapshot in CI.
  release:
    args: "--snapshot --clean"
  verify:
    do: "skaffold verify"
    use: ""
