say:
  generate:
    rulemap:
      auto-cue: null
  launch:
    do: "^mise x -- ./gradlew dev"
  # Local-dev defaults: pick bake branch, keep local pushes off shared
  # depot. Sayt's verb-level args are all-or-nothing, so CI's explicit
  # `--builder X --target ci` suppresses both. Don't inline the
  # cache-to wipe into the CI workflow — only inner compose-up would
  # then write to depot, with chain IDs that drift from outer's, and
  # the warm cache breaks across runs.
  integrate:
    args: '--bake --no-up --no-cache-from --no-cache-to'
  # Goreleaser-OSS doesn't understand sayt's path-prefixed monorepo
  # tags (services/tracker/v0.2.1) — that's a pro feature. --snapshot
  # keeps goreleaser in dev mode (skips the strict tag-on-HEAD
  # validation), --clean wipes dist/ so re-runs are idempotent.
  # Matches CI's invocation in .github/workflows/ci.yml. Real
  # tag-push releases (refs/tags/*) drop --snapshot in CI.
  release:
    args: "--snapshot --clean"
  verify:
    do: "skaffold verify"
    use: ""
