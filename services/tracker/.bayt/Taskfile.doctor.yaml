tasks:
  default:
    run: always
    status:
    - mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/fingerprint.nu --manifest {{.TASKFILE_DIR}}/bayt.doctor.json --stamp-file .task/bayt/doctor.hash
    vars:
      BAYTW: mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/cache.nu run --manifest {{.TASKFILE_DIR}}/bayt.doctor.json --
    cmds:
    - '{{.BAYTW}} mise doctor'
    - defer: '{{if not .EXIT_CODE}}mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/fingerprint.nu --manifest {{.TASKFILE_DIR}}/bayt.doctor.json --stamp-file .task/bayt/doctor.hash --update-stamp{{end}}'
version: '3'
