tasks:
  default:
    status:
    - mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/fingerprint.nu --manifest {{.TASKFILE_DIR}}/bayt.generate.json --stamp-file .task/bayt/generate.hash
    vars:
      BAYTW: mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/cache.nu run --manifest {{.TASKFILE_DIR}}/bayt.generate.json -- mise x --
    cmds:
    - '{{.BAYTW}} nu sayt.nu generate'
    - defer: '{{if not .EXIT_CODE}}mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/fingerprint.nu --manifest {{.TASKFILE_DIR}}/bayt.generate.json --stamp-file .task/bayt/generate.hash --update-stamp{{end}}'
version: '3'
