tasks:
  default:
    deps:
    - ::bayt:release
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.verify.json --stamp-file .task/bayt/verify.hash
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.verify.json -- mise x --
    cmds:
    - '{{.BAYTW}} ./gradlew --init-script .bayt/init.gradle.kts check'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.verify.json --stamp-file .task/bayt/verify.hash --update-stamp{{end}}'
version: '3'
