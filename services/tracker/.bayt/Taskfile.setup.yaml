tasks:
  default:
    status:
    - bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --stamp-file .task/bayt/setup.hash
    vars:
      BAYTW: bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.setup.json --
    cmds:
    - '{{.BAYTW}} mise install'
    - defer: '{{if not .EXIT_CODE}}bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --stamp-file .task/bayt/setup.hash --update-stamp{{end}}'
version: '3'
