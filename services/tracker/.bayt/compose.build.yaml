services:
  services_tracker-build:
    build:
      additional_contexts:
        bayt-runtime: ${BAYT_RUNTIME:-docker-image://bonitao/bayt:0.5.0@sha256:29447e97c3634b048e06fc39bab2d227128d6eb96a69b4560911499586830492}
        libraries_logs-build: service:libraries_logs-build
        libraries_pbtables-build: service:libraries_pbtables-build
        libraries_xproto-build: service:libraries_xproto-build
        plugins_libstoml-build: service:plugins_libstoml-build
        plugins_jvm-build: service:plugins_jvm-build
        plugins_micronaut-build: service:plugins_micronaut-build
        services_tracker-setup: service:services_tracker-setup
      context: ..
      dockerfile: .bayt/Dockerfile.build
      target: build
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:tracker-bake-cache-v1-services_tracker-build
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:tracker-bake-cache-v1-services_tracker-build,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-services_tracker-build:latest
