services:
  services_tracker-setup:
    build:
      additional_contexts:
        bayt-runtime: ${BAYT_RUNTIME:-docker-image://bonitao/bayt:0.5.0@sha256:29447e97c3634b048e06fc39bab2d227128d6eb96a69b4560911499586830492}
        workspaceroot-setup: service:workspaceroot-setup
      context: ..
      dockerfile: .bayt/Dockerfile.setup
      target: setup
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:tracker-bake-cache-v1-services_tracker-setup
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:tracker-bake-cache-v1-services_tracker-setup,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-services_tracker-setup:latest
