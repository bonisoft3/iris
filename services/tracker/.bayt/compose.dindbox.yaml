services:
  services_tracker-dindbox:
    build:
      additional_contexts:
        services_tracker-build: service:services_tracker-build
        services_tracker-ops: service:services_tracker-ops
        workspaceroot-setup: service:workspaceroot-setup
        libraries_logs-build: service:libraries_logs-build
        libraries_pbtables-build: service:libraries_pbtables-build
        libraries_xproto-build: service:libraries_xproto-build
        plugins_libstoml-build: service:plugins_libstoml-build
        plugins_jvm-build: service:plugins_jvm-build
        plugins_micronaut-build: service:plugins_micronaut-build
        workspaceroot-ops: service:workspaceroot-ops
        libraries_logs-ops: service:libraries_logs-ops
        libraries_pbtables-ops: service:libraries_pbtables-ops
        libraries_xproto-ops: service:libraries_xproto-ops
        plugins_libstoml-ops: service:plugins_libstoml-ops
        plugins_jvm-ops: service:plugins_jvm-ops
        plugins_micronaut-ops: service:plugins_micronaut-ops
        docker:29.2.0-cli@sha256:ae2609c051339b48c157d97edc4f1171026251607b29a2b0f25f990898586334: docker-image://docker:29.2.0-cli@sha256:ae2609c051339b48c157d97edc4f1171026251607b29a2b0f25f990898586334
        alpine/socat:latest@sha256:bfd2550379212e087dc18db2f4611f43477be4b575d660c8f18c5b9a1b2e2757: docker-image://alpine/socat:latest@sha256:bfd2550379212e087dc18db2f4611f43477be4b575d660c8f18c5b9a1b2e2757
      context: ..
      dockerfile: .bayt/Dockerfile.dindbox
      target: dindbox
    command:
    - sh
    - -c
    - docker compose config -o /tmp/flat.yaml && docker buildx bake --allow=fs.read=/monorepo -f /tmp/flat.yaml --progress plain services_tracker-ci
    entrypoint:
    - /usr/local/bin/dind-entrypoint.sh
    environment:
      BUILDX_NO_DEFAULT_ATTESTATIONS: '1'
    image: bayt-services_tracker-dindbox:latest
    ports:
    - '2375'
    volumes:
    - //var/run/docker.sock:/var/run/docker.sock
