# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: services-tracker-tx

before:
  hooks:
    # bayt-build profile auto-fires via `command: build` activation.
    - skaffold -f .bayt/skaffold.release.yaml build --push=false --tag={{ .Version }}

builds:
  # goreleaser v2 defaults to builder:go and runs `go list -m` even with
  # skip:true — setting a non-go builder prevents that probe.
  - builder: zig
    skip: true

publishers:
  - name: skaffold
    cmd: skaffold -f .bayt/skaffold.release.yaml build --tag={{ .Version }}

release:
  disable: true
