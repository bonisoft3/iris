apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: services_tracker-tx
build:
  artifacts:
    - image: gcr.io/trash-362115/services.tracker-tx-gcp
      custom:
        buildCommand: docker buildx bake --allow=fs.read=../.. release
  local:
    useBuildkit: true
    concurrency: 64

profiles:
- name: production
  build:
    platforms: ["linux/amd64"]
    local:
      push: true

test:
 - image: gcr.io/trash-362115/services.tracker-tx
   custom:
   - command: just integrate
     timeoutSeconds: 3000
