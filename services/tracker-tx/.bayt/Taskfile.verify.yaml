tasks:
  default:
    deps:
    - ::bayt:release
    status:
    - mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/fingerprint.nu --manifest {{.TASKFILE_DIR}}/bayt.verify.json --stamp-file .task/bayt/verify.hash
    vars:
      BAYTW: mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/cache.nu run --manifest {{.TASKFILE_DIR}}/bayt.verify.json -- mise x --
    cmds:
    - '{{.BAYTW}} nu sayt.nu verify'
    - defer: '{{if not .EXIT_CODE}}mise x -- nu {{.TASKFILE_DIR}}/../../../plugins/bayt/runtime/fingerprint.nu --manifest {{.TASKFILE_DIR}}/bayt.verify.json --stamp-file .task/bayt/verify.hash --update-stamp{{end}}'
version: '3'
