tasks:
  default:
    deps:
    - ::bayt:release
    status:
    - bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.verify.json --stamp-file .task/bayt/verify.hash
    vars:
      BAYTW: bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.verify.json -- mise x --
    cmds:
    - '{{.BAYTW}} nu sayt.nu verify'
    - defer: '{{if not .EXIT_CODE}}bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.verify.json --stamp-file .task/bayt/verify.hash --update-stamp{{end}}'
version: '3'
