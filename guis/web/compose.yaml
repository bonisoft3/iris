# Hand-maintained root for develop/release; integrate now comes from
# the bayt-generated federated graph (guis_web-integrate uses
# .bayt/integrate.Dockerfile with bayt.incremental for in-container
# task-based chain short-circuiting). sayt integrate targets the
# qualified service name via the .say.yaml override.
include:
  - path: ./.bayt/compose.yaml

volumes:
  root-dot-docker-cache-mount: {}

services:
  develop:
    command: pnpm dev
    ports:
      - "3000:3000"
    build:
      network: host
      context: ../..
      dockerfile: guis/web/Dockerfile
      secrets:
        - host.env
      target: debug
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
      - ${HOME:-~}/.skaffold/cache:/root/.skaffold/cache
    entrypoint:
      - /monorepo/plugins/devserver/dind.sh
    secrets:
      - host.env
    network_mode: host
  release:
    build:
      context: ../..
      dockerfile: guis/web/Dockerfile
      target: release

secrets:
  host.env:
    environment: HOST_ENV
