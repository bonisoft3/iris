# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: guis-web

before:
  hooks:
    - pnpm install --frozen-lockfile
    - pnpm exec dotenv -e .env.production -- pnpm exec nuxt build

builds:
  # goreleaser v2 defaults to builder:go and runs `go list -m` even with
  # skip:true — setting a non-go builder prevents that probe.
  - builder: zig
    skip: true

publishers:
  - name: firebase
    cmd: pnpm decrypt-creds && pnpm exec firebase deploy --message "{{ .Version }}"

release:
  disable: true
