say:
  build:
    do: "run-task bayt:build"
    use: "./tools.nu [run-task]"
  test:
    do: "run-task bayt:test"
    use: "./tools.nu [run-task]"
  integrate:
    # Skip the depot cache for local buildkit; CI re-enables it via action flags.
    args: "--bake --no-up --no-cache-from --no-cache-to"
  generate:
    rulemap:
      nuxt-prepare:
        cmds:
          - do: "pnpm nuxt prepare"
  lint:
    rulemap:
      auto-cue: null
      eslint:
        cmds:
          - do: "pnpm lint"
