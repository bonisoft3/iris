tasks:
  default:
    run: always
    status:
    - ../../plugins/bayt/runtime/bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.lint.json --stamp-file .task/bayt/lint.hash
    vars:
      BAYTW: ../../plugins/bayt/runtime/bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.lint.json -- mise x --
    cmds:
    - '{{.BAYTW}} mise x -- pnpm lint'
    - defer: '{{if not .EXIT_CODE}}../../plugins/bayt/runtime/bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.lint.json --stamp-file .task/bayt/lint.hash --update-stamp{{end}}'
version: '3'
