tasks:
  default:
    run: always
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.lint.json --stamp-file .task/bayt/lint.hash
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.lint.json -- mise x --
    cmds:
    - '{{.BAYTW}} mise x -- pnpm lint'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.lint.json --stamp-file .task/bayt/lint.hash --update-stamp{{end}}'
version: '3'
