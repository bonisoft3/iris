tasks:
  default:
    deps:
    - ::bayt:build
    status:
    - ../../plugins/bayt/runtime/bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.integrate.json --stamp-file .task/bayt/integrate.hash
    vars:
      BAYTW: ../../plugins/bayt/runtime/bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.integrate.json -- mise x --
    cmds:
    - '{{.BAYTW}} mise x -- pnpm test:int'
    - defer: '{{if not .EXIT_CODE}}../../plugins/bayt/runtime/bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.integrate.json --stamp-file .task/bayt/integrate.hash --update-stamp{{end}}'
version: '3'
