tasks:
  default:
    deps:
    - ::bayt:build
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.integrate.json --stamp-file .task/bayt/integrate.hash
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.integrate.json -- mise x --
    cmds:
    - '{{.BAYTW}} mise x -- pnpm test:int'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.integrate.json --stamp-file .task/bayt/integrate.hash --update-stamp{{end}}'
version: '3'
