services:
  guis_web-launch:
    build:
      additional_contexts:
        guis_web-build: service:guis_web-build
        workspaceroot-setup: service:workspaceroot-setup
        opensuse/leap:16.0@sha256:859560554b625c225fa767b76d61253d529b95d082c2d68579ad69168d5e3da7: docker-image://opensuse/leap:16.0@sha256:859560554b625c225fa767b76d61253d529b95d082c2d68579ad69168d5e3da7
      context: ..
      dockerfile: .bayt/Dockerfile.launch
      target: launch
    develop:
      watch:
      - action: sync
        path: .././
        target: /monorepo/guis/web/./
      - action: rebuild
        path: ../package.json
      - action: rebuild
        path: ../pnpm-lock.yaml
    image: bayt-guis_web-launch:latest
