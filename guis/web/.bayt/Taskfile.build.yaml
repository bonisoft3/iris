tasks:
  default:
    deps:
    - ::bayt:setup
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.build.json --stamp-file .task/bayt/build.hash
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.build.json -- mise x --
    cmds:
    - '{{.BAYTW}} mise x -- pnpm build'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.build.json --stamp-file .task/bayt/build.hash --update-stamp{{end}}'
version: '3'
