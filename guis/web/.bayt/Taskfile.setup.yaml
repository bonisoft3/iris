tasks:
  default:
    cmds:
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --stamp-file .task/bayt/setup.hash --update-stamp{{end}}'
    deps:
    - pnpm
  builtin:
    env:
      SHARP_IGNORE_GLOBAL_LIBVIPS: '1'
    internal: true
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.setup.json --cmd builtin --
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --cmd builtin --stamp-file .task/bayt/setup.builtin.hash
    generates:
    - .task/bayt/setup.builtin.hash
    cmds:
    - '{{.BAYTW}} mise install'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --cmd builtin --stamp-file .task/bayt/setup.builtin.hash --update-stamp{{end}}'
  pnpm:
    deps:
    - builtin
    env:
      SHARP_IGNORE_GLOBAL_LIBVIPS: '1'
    internal: true
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.setup.json --cmd pnpm --
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --cmd pnpm --stamp-file .task/bayt/setup.pnpm.hash
    generates:
    - .task/bayt/setup.pnpm.hash
    cmds:
    - '{{.BAYTW}} mise x -- pnpm install --frozen-lockfile --filter Iris...'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.setup.json --cmd pnpm --stamp-file .task/bayt/setup.pnpm.hash --update-stamp{{end}}'
version: '3'
