name: cd

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CUE publish runs before tarball staging: `cue mod publish`
      # with `source: kind: "git"` rejects an unclean working tree,
      # and the staging step creates untracked dist/ + bayt-stage/.
      - name: Set up CUE
        if: startsWith(github.ref, 'refs/tags/')
        uses: cue-lang/setup-cue@v1.0.1
        with:
          version: 'latest'

      # OIDC login to registry.cue.works. Requires a one-time trust
      # entry configured on cue.dev binding this workflow to publish
      # under github.com/bonisoft3/bayt.
      - name: Authenticate to CUE Central Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: cue-labs/registry-login-action@v1

      - name: Publish CUE module
        if: startsWith(github.ref, 'refs/tags/')
        run: cue mod publish "${GITHUB_REF_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: bonitao
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (bayt)
        id: meta-bayt
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/bonisoft3/bayt
            bonitao/bayt
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push bayt
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta-bayt.outputs.tags }}
          labels: ${{ steps.meta-bayt.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Stage release content
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          # bayt is pure source (cue + nu) — no compile step. Stage the
          # tree minus repo-only files into a release directory.
          mkdir bayt-stage
          tar cf - --exclude=.git --exclude=.github --exclude=tests --exclude=dist --exclude=bayt-stage . | tar xf - -C bayt-stage
          # Ship per-platform-named tarballs (same content). Mise's
          # `github:` backend matches the consumer runner's platform
          # against the asset name; for a source-only tool we publish
          # one universal payload under every platform name.
          for triple in linux-x64 linux-arm64 linux-armv7 macos-x64 macos-arm64 windows-x64 windows-arm64; do
            tar czf "dist/bayt-${triple}.tar.gz" -C bayt-stage .
          done

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
