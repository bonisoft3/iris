name: cd

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release content
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          # bayt is pure source (cue + nu) — no compile step. Stage the
          # tree minus repo-only files into a release directory.
          mkdir bayt-stage
          tar cf - --exclude=.git --exclude=.github --exclude=tests --exclude=dist --exclude=bayt-stage . | tar xf - -C bayt-stage
          # Ship per-platform-named tarballs (same content). Mise's
          # `github:` backend matches the consumer runner's platform
          # against the asset name; for a source-only tool we publish
          # one universal payload under every platform name.
          for triple in linux-x64 linux-arm64 linux-armv7 macos-x64 macos-arm64 windows-x64 windows-arm64; do
            tar czf "dist/bayt-${triple}.tar.gz" -C bayt-stage .
          done

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Set up CUE
        if: startsWith(github.ref, 'refs/tags/')
        uses: cue-lang/setup-cue@v1.0.1
        with:
          version: 'latest'

      # OIDC login to registry.cue.works. Requires a one-time trust
      # entry configured on cue.dev binding this workflow to publish
      # under github.com/bonisoft3/bayt.
      - name: Authenticate to CUE Central Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: cue-labs/registry-login-action@v1

      - name: Publish CUE module
        if: startsWith(github.ref, 'refs/tags/')
        run: cue mod publish "${GITHUB_REF_NAME}"
