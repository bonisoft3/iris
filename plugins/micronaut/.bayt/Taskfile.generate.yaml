tasks:
  default:
    status:
    - bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.generate.json --stamp-file .task/bayt/generate.hash
    vars:
      BAYTW: bayt-runtime cache run --manifest {{.TASKFILE_DIR}}/bayt.generate.json -- mise x --
    cmds:
    - '{{.BAYTW}} nu sayt.nu generate'
    - defer: '{{if not .EXIT_CODE}}bayt-runtime fingerprint --manifest {{.TASKFILE_DIR}}/bayt.generate.json --stamp-file .task/bayt/generate.hash --update-stamp{{end}}'
version: '3'
