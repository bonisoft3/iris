services:
  plugins_micronaut-build:
    build:
      additional_contexts:
        bayt-runtime: ../../../plugins/bayt
        workspaceroot-setup: service:workspaceroot-setup
        plugins_libstoml-build: service:plugins_libstoml-build
        plugins_micronaut-setup: service:plugins_micronaut-setup
      context: ..
      dockerfile: .bayt/Dockerfile.build
      target: build
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_micronaut-build
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_micronaut-build,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-plugins_micronaut-build:latest
