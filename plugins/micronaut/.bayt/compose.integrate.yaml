services:
  plugins_micronaut-integrate:
    build:
      additional_contexts:
        bayt-runtime: ../../../plugins/bayt
        plugins_micronaut-build: service:plugins_micronaut-build
      context: ..
      dockerfile: .bayt/Dockerfile.integrate
      target: integrate
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_micronaut-integrate
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_micronaut-integrate,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-plugins_micronaut-integrate:latest
