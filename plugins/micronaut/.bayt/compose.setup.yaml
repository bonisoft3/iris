services:
  plugins_micronaut-setup:
    build:
      additional_contexts:
        bayt-runtime: ../../../plugins/bayt
        plugins_jvm-build: service:plugins_jvm-build
      context: ..
      dockerfile: .bayt/Dockerfile.setup
      target: setup
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_micronaut-setup
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_micronaut-setup,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-plugins_micronaut-setup:latest
