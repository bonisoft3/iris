services:
  plugins_libstoml-build:
    build:
      additional_contexts:
        plugins_libstoml-setup: service:plugins_libstoml-setup
        bayt-runtime: ../../../plugins/bayt
      context: ..
      dockerfile: .bayt/Dockerfile.build
      target: build
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_libstoml-build
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_libstoml-build,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-plugins_libstoml-build:latest
