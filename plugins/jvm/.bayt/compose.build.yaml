services:
  plugins_jvm-build:
    build:
      additional_contexts:
        plugins_libstoml-build: service:plugins_libstoml-build
        bayt: ../../../plugins/bayt/runtime
        plugins_jvm-setup: service:plugins_jvm-setup
      context: ..
      dockerfile: .bayt/Dockerfile.build
      target: build
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_jvm-build
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_jvm-build,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-plugins_jvm-build:latest
