services:
  plugins_omnishell-integrate:
    build:
      additional_contexts:
        plugins_omnishell-build: service:plugins_omnishell-build
      context: ..
      dockerfile: .bayt/Dockerfile.integrate
      target: integrate
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_omnishell-integrate
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-plugins_omnishell-integrate,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-plugins_omnishell-integrate:latest
