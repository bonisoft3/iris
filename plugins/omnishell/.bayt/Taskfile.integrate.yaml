tasks:
  default:
    deps:
    - ::bayt:build
    status:
    - bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.integrate.json --stamp-file .task/bayt/integrate.hash
    vars:
      BAYTW: bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.integrate.json -- mise x --
    cmds:
    - '{{.BAYTW}} bun test'
    - defer: '{{if not .EXIT_CODE}}bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.integrate.json --stamp-file .task/bayt/integrate.hash --update-stamp{{end}}'
version: '3'
