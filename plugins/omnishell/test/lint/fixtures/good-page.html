<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    .header { height: 48px; background: #333; color: white; display: flex; align-items: center; padding: 0 16px; }
    .content { padding: 16px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .btn { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; min-width: 44px; min-height: 44px; }
    .image-container { aspect-ratio: 16/9; overflow: hidden; position: relative; }
    .image-container img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    a { color: #007bff; padding: 8px; display: inline-block; min-width: 44px; min-height: 44px; }
  </style>
</head>
<body>
  <div class="header"><span>Good Page</span></div>
  <div class="content">
    <div class="card">
      <h2>Card Title</h2>
      <p>Card content with proper layout</p>
      <button class="btn" data-testid="action-btn">Action</button>
    </div>
    <div class="card">
      <div class="image-container" data-constrained-image>
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="placeholder">
      </div>
    </div>
    <a href="/about">About</a>
  </div>
</body>
</html>
