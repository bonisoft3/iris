[settings]
locked = true
lockfile = true
experimental = true
paranoid = false
# Global verification toggles must be set alongside the backend-scoped
# ones below; the backend settings don't override the globals. With a
# complete lockfile, downloads verify via the embedded sha256 — no
# attestation API calls needed.
github_attestations = false
slsa = false
github.slsa = false
github.github_attestations = false
aqua.github_attestations = false
aqua.cosign = false
aqua.slsa = false
aqua.minisign = false
idiomatic_version_file_enable_tools = ["python"]

[tools]
"github:nektos/act" = "v0.2.84"
"github:casey/just" = "1.48.1"
"github:nushell/nushell" = "0.110.0"
"github:cue-lang/cue" = "0.16.0"
"github:astral-sh/uv" = "0.11.2"
