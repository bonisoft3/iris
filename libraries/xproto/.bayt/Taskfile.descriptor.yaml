tasks:
  default:
    status:
    - bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.descriptor.json --stamp-file .task/bayt/descriptor.hash
    vars:
      BAYTW: bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.descriptor.json -- mise x -- sh -c
    cmds:
    - '{{.BAYTW}} "mkdir -p out && mise x -- buf build --as-file-descriptor-set --exclude-source-info -o ''out/xproto.desc.pb#format=binpb'' ."'
    - defer: '{{if not .EXIT_CODE}}bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.descriptor.json --stamp-file .task/bayt/descriptor.hash --update-stamp{{end}}'
version: '3'
