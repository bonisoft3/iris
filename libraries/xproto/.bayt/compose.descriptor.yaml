        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_xproto-descriptor,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-libraries_xproto-descriptor:latest
