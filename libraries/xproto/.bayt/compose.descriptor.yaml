        workspaceroot-setup: service:workspaceroot-setup
      context: ..
      dockerfile: .bayt/Dockerfile.descriptor
      target: descriptor
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_xproto-descriptor
