services:
  libraries_logs-build:
    build:
      additional_contexts:
        bayt-runtime: ../../../plugins/bayt
        workspaceroot-setup: service:workspaceroot-setup
        plugins_libstoml-build: service:plugins_libstoml-build
        libraries_logs-setup: service:libraries_logs-setup
      context: ..
      dockerfile: .bayt/Dockerfile.build
      target: build
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_logs-build
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_logs-build,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-libraries_logs-build:latest
