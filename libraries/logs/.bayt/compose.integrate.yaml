services:
  libraries_logs-integrate:
    build:
      additional_contexts:
        libraries_logs-build: service:libraries_logs-build
      context: ..
      dockerfile: .bayt/Dockerfile.integrate
      target: integrate
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_logs-integrate
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_logs-integrate,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-libraries_logs-integrate:latest
