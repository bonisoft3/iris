services:
  libraries_pbtables-build:
    build:
      additional_contexts:
        bayt-runtime: ${BAYT_RUNTIME:-docker-image://bonitao/bayt:0.5.0@sha256:29447e97c3634b048e06fc39bab2d227128d6eb96a69b4560911499586830492}
        workspaceroot-setup: service:workspaceroot-setup
        plugins_libstoml-build: service:plugins_libstoml-build
        plugins_micronaut-build: service:plugins_micronaut-build
        libraries_xproto-build: service:libraries_xproto-build
        libraries_logs-build: service:libraries_logs-build
        libraries_pbtables-setup: service:libraries_pbtables-setup
      context: ..
      dockerfile: .bayt/Dockerfile.build
      target: build
      x-bake:
        cache-from:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_pbtables-build
        cache-to:
        - type=registry,ref=registry.depot.dev/f5k5087x1b:monorepo-bake-cache-v1-libraries_pbtables-build,mode=min,image-manifest=true,oci-mediatypes=true
    image: bayt-libraries_pbtables-build:latest
