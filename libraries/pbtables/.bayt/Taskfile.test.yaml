tasks:
  default:
    deps:
    - ::bayt:build
    status:
    - bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.test.json --stamp-file .task/bayt/test.hash
    vars:
      BAYTW: bayt cache run --manifest {{.TASKFILE_DIR}}/bayt.test.json -- mise x --
    cmds:
    - '{{.BAYTW}} ./gradlew --init-script .bayt/init.gradle.kts test'
    - defer: '{{if not .EXIT_CODE}}bayt fingerprint --manifest {{.TASKFILE_DIR}}/bayt.test.json --stamp-file .task/bayt/test.hash --update-stamp{{end}}'
version: '3'
