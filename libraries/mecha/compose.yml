services:
  database:
    build:
      context: services/database
      dockerfile: Dockerfile
    ports:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mecha}
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-d", "${POSTGRES_DB:-mecha}", "-U", "${POSTGRES_USER:-postgres}"]
      start_interval: 100ms
      start_period: 5m

  crud:
    image: postgrest/postgrest:v12.2.3@sha256:0a46780309a604cdc8b56c776c6e5e15788ce58174d709e40459ab5a2d44d228
    depends_on:
      database:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-mecha}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_SERVER_HOST: '*'
      PGRST_SERVER_PORT: 3000
      PGRST_ADMIN_SERVER_PORT: 3001
    ports:
      - "3000"
      - "3001"

  boxer:
    image: ghcr.io/bonisoft3/boxer:latest
    depends_on:
      database:
        condition: service_healthy
      webhook:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-mecha}
      BOXER_DELIVERY_URL: http://webhook:8080
      BOXER_PUBLICATION: boxer_pub
      BOXER_TABLE: Hello
    restart: on-failure

  electric:
    image: electricsql/electric:latest
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-mecha}
      ELECTRIC_INSECURE: "true"
    ports:
      - "5133"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5133/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  webhook:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
    ports:
      - "8080"

  # --- AI profile: stream processing + LLM gateway ---

  redis:
    image: redis:7.4.1-alpine@sha256:59b6e694653476de2c992937ebe1c64182af4728e54bb49e9b7a6c26614d8933
    ports:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s
    profiles:
      - ai
      - unicorn

  proxy:
    build:
      context: services/proxy
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
      crud:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      UPSTREAM_HOST: ${UPSTREAM_HOST:-webhook}
      UPSTREAM_PORT: ${UPSTREAM_PORT:-8080}
    ports:
      - "80"
    profiles:
      - ai
      - unicorn

  arroyo:
    build:
      context: services/arroyo
      dockerfile: Dockerfile
    depends_on:
      proxy:
        condition: service_started
    ports:
      - "5115"
    profiles:
      - ai

  # --- Unicorn profile: service mesh + durable delivery ---

  mesh:
    build:
      context: services/mesh
      dockerfile: Dockerfile
    depends_on:
      proxy:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "3500"
    profiles:
      - unicorn

  # Smoke test: verify CRUD and CDC delivery end-to-end
  integrate:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      crud:
        condition: service_started
      boxer:
        condition: service_started
    restart: "no"
