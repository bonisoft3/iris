version: '3'

vars:
  PROTO_DIR: proto
  GEN_DIR: gen

tasks:
  buf:generate:
    desc: "Generate JSON Schema from protobuf"
    dir: "{{.PROTO_DIR}}"
    cmds:
      - mkdir -p ../{{.GEN_DIR}}/jsonschema
      - buf generate
    sources:
      - "*.proto"
      - "buf.gen.yaml"
    generates:
      - "../{{.GEN_DIR}}/jsonschema/**/*.json"

  cue:generate:
    desc: "Generate convention-based templates via CUE+gomplate"
    deps: [buf:generate]
    cmds:
      - cue cmd generate tmpl_tool.cue
    sources:
      - "**/*.tmpl"
      - "**/*.cue"
    generates:
      - "**/*.hcl"
      - "**/*.yaml"
      - "**/*.conf"
      - "**/*.sql"

  generate:
    desc: "Generate all artifacts from protobuf schemas and atlas"
    deps: [buf:generate, cue:generate, atlas:hash]
    cmds:
      - echo "Generated all artifacts"

  build:
    desc: "Build artifacts (delegates to generate)"
    deps: [generate]
    cmds:
      - echo "Build complete"

  launch:
    desc: "Start the local dev stack with hot reload"
    deps: [generate]
    cmds:
      - docker compose up --build --watch

  integrate:
    desc: "Run CRUD + CDC smoke tests"
    cmds:
      - docker compose run --build integrate

  clean:
    desc: "Clean generated files and Docker state"
    cmds:
      - docker compose down -v || true
      - rm -rf gen/*
      - echo "Cleaned generated files and Docker volumes"

  status:
    desc: "Show health of running services"
    cmds:
      - |
        echo "Service health checks:"
        curl -s --connect-timeout 1 http://localhost:3000/ > /dev/null && echo "crud (PostgREST) OK" || echo "crud (PostgREST) not responding"
        curl -s --connect-timeout 1 http://localhost:5133/v1/health > /dev/null && echo "electric OK" || echo "electric not responding"

  atlas:hash:
    desc: "Generate migration checksums for atlas.sum file"
    cmds:
      - |
        if command -v atlas >/dev/null 2>&1; then
          atlas migrate hash --dir file://services/database/migrations
        else
          echo "Atlas not found in PATH, skipping migration hash generation"
          touch services/database/migrations/atlas.sum
        fi
    sources:
      - "services/database/migrations/*.sql"
    generates:
      - "services/database/migrations/atlas.sum"
