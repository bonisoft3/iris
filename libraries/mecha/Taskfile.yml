version: '3'

vars:
  PROTO_DIR: proto
  GEN_DIR: gen

tasks:
  # ================================================================
  # Code generation pipeline
  # ================================================================

  buf:generate:
    desc: "Generate JSON Schema from protobuf"
    dir: "{{.PROTO_DIR}}"
    cmds:
      - mkdir -p ../{{.GEN_DIR}}/jsonschema
      - buf generate
    sources:
      - "*.proto"
      - "buf.gen.yaml"
    generates:
      - "../{{.GEN_DIR}}/jsonschema/**/*.json"

  cue:generate:
    desc: "Generate convention-based templates via CUE+gomplate"
    deps: [buf:generate]
    cmds:
      - cue cmd generate tmpl_tool.cue
    sources:
      - "**/*.tmpl"
      - "**/*.cue"
    generates:
      - "**/*.hcl"
      - "**/*.yaml"
      - "**/*.conf"
      - "**/*.sql"

  generate:
    desc: "Generate all artifacts from protobuf schemas and atlas"
    deps: [buf:generate, cue:generate, atlas:hash]
    cmds:
      - echo "Generated all artifacts"

  # ================================================================
  # Launch — start the stack with hot reload (--watch)
  # ================================================================
  # `task launch` brings up ALL profiles (crud + offline + events + ai
  # + unicorn). Use launch:crud/offline/events/ai for narrower slices.

  launch:
    desc: "Start the full stack (all profiles) with hot reload"
    deps: [generate]
    cmds:
      - docker compose --profile offline --profile events --profile ai --profile unicorn up --build --watch

  launch:crud:
    desc: "crud profile only (PostgreSQL + PostgREST + Caddy + Dapr)"
    deps: [generate]
    cmds:
      - docker compose up --build --watch

  launch:offline:
    desc: "+ ElectricSQL"
    deps: [generate]
    cmds:
      - docker compose --profile offline up --build --watch

  launch:events:
    desc: "+ Conduit + NATS + rpk"
    deps: [generate]
    cmds:
      - docker compose --profile offline --profile events up --build --watch

  launch:ai:
    desc: "+ Arroyo + MQTT + Redis"
    deps: [generate]
    cmds:
      - docker compose --profile offline --profile events --profile ai up --build --watch

  # ================================================================
  # Unit tests — pure, fast, offline (no network, no Docker daemon)
  # ================================================================

  test:
    desc: "Run unit tests: cue vet + buf lint (pure, cross-platform)"
    deps: [buf:generate]
    cmds:
      - cue vet ./...
      - buf lint proto

  # ================================================================
  # Smoke tests
  # ================================================================

  integrate:
    desc: "Run crud smoke tests"
    cmds:
      - docker compose --profile test run --build integrate

  integrate:events:
    desc: "Run events pipeline smoke tests"
    cmds:
      - docker compose --profile offline --profile events --profile test-events run --build integrate-events

  integrate:ai:
    desc: "Run stream analytics smoke tests (Arroyo E2E)"
    cmds:
      - docker compose --profile offline --profile events --profile ai --profile test-ai run --build integrate-ai

  integrate:unicorn:
    desc: "Run unicorn profile smoke tests (Garage S3 + imgproxy)"
    cmds:
      - docker compose --profile unicorn --profile test-unicorn run --build integrate-unicorn

  # ================================================================
  # Benchmarks (events + ai profiles)
  # ================================================================

  benchmark:
    desc: "Run startup + CRUD + CDC benchmarks (events profile)"
    cmds:
      - nu scripts/benchmark.nu

  benchmark:ai:
    desc: "Run startup + CRUD + CDC benchmarks (ai profile)"
    cmds:
      - nu scripts/benchmark.nu --profile ai

  # ================================================================
  # Atlas — dev-time migration generation from HCL schema
  # ================================================================

  atlas:diff:
    desc: "Generate versioned migration from HCL schema changes"
    cmds:
      - |
        atlas migrate diff {{.CLI_ARGS | default "schema_change"}} \
          --dir "file://services/database/migrations" \
          --dev-url "docker://postgres/18/dev" \
          --to "file://services/database/schemas/"
        atlas migrate hash --dir file://services/database/migrations
    sources:
      - "services/database/schemas/*.hcl"

  atlas:hash:
    desc: "Regenerate atlas.sum after migration changes"
    cmds:
      - atlas migrate hash --dir file://services/database/migrations
    sources:
      - "services/database/migrations/*.sql"
    generates:
      - "services/database/migrations/atlas.sum"

  # ================================================================
  # Utility
  # ================================================================

  clean:
    desc: "Stop all services and remove generated files"
    cmds:
      - docker compose --profile offline --profile events --profile ai --profile unicorn down -v || true
      - rm -rf gen/*
