apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: jetstream
spec:
  type: pubsub.jetstream
  version: v1
  metadata:
    - name: natsURL
      value: "nats://nats:4222"
    - name: durableName
      value: "mecha-durable"
    - name: ackPolicy
      value: "explicit"
    - name: ackWait
      value: "30s"
    - name: maxDeliver
      value: "5"
    - name: backOff
      value: "1s, 5s, 30s"
    - name: deliverPolicy
      value: "all"
