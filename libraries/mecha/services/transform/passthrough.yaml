# CDC enrichment pipeline: consume Dapr CloudEvents from JetStream and PATCH
# back to PostgREST with processed_at/source. Skips already-enriched rows
# to break the CDC amplification loop.
#
# Dapr CloudEvent format: { "data": "{\"id\":\"...\",\"message\":\"...\", ...}" }
# (the "data" field is a JSON-encoded string of the row)

input:
  nats_jetstream:
    urls:
      - "nats://nats:4222"
    subject: "cdc-events"
    stream: "cdc-events"
    durable: "rpk-transform"
    deliver: "all"
    ack_wait: "30s"
    max_ack_pending: 1024

pipeline:
  processors:
    - bloblang: |
        let entity = this.data.parse_json().catch({})

        meta record_id = $entity.id | "unknown"
        meta collection = "Hello"

        root = if $entity.id != null && $entity.processed_at == null {
          {
            "processed_at": now(),
            "source": "mecha-rpk"
          }
        } else {
          deleted()
        }

output:
  retry:
    max_retries: 3
    backoff:
      initial_interval: 2s
      max_interval: 30s
      max_elapsed_time: 3m
    output:
      http_client:
        url: http://crud:3000/${! meta("collection") }?id=eq.${! meta("record_id") }
        verb: PATCH
        headers:
          Content-Type: application/json
          Prefer: return=representation
        timeout: 30s
        successful_on:
          - 200
          - 204
