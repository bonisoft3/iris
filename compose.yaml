# services_tracker, guis_web, and services_boxer bring in the
# bayt-emitted integrate chain via the include cascade below. Each
# project's compose.bayt.yaml transitively includes per-verb fragments
# + sibling library/plugin build context wiring; the qualified service
# names (services_tracker-*, guis_web-*, services_boxer-*,
# libraries_*-build, plugins_*-build, bayt-runtime-stub,
# workspaceroot-setup) become available to bake's chain resolution.
include:
  - path: ./services/tracker/.bayt/compose.bayt.yaml
  - path: ./guis/web/.bayt/compose.bayt.yaml
  - path: ./services/boxer/.bayt/compose.bayt.yaml

services:
  services_tracker:
    extends:
      file: ./services/tracker/.bayt/compose.integrate.yaml
      service: services_tracker-integrate

  guis_web:
    extends:
      file: ./guis/web/.bayt/compose.integrate.yaml
      service: guis_web-integrate

  services_boxer:
    extends:
      file: ./services/boxer/.bayt/compose.integrate.yaml
      service: services_boxer-integrate

  integrate:
    build:
      context: .
      network: host
      dockerfile: ./Dockerfile
      target: integrate
      secrets:
        - host.env
  guis_iris:
    build:
      context: ./guis/iris
      network: host
      dockerfile: ./Dockerfile
      target: release

  services_shelfie:
    build:
      context: .
      network: host
      dockerfile: ./services/shelfie/Dockerfile
      target: integrate
      secrets:
        - host.env
  services_tracker_tx:
    build:
      context: .
      network: host
      dockerfile: ./services/tracker-tx/Dockerfile
      target: integrate
      secrets:
        - host.env
  plugins_devserver:
    build:
      context: .
      network: host
      dockerfile: ./plugins/devserver/Dockerfile
      target: integrate
      secrets:
        - host.env
  plugins_sayt:
    build:
      context: ./plugins/sayt
      network: host
      dockerfile: ./Dockerfile
      additional_contexts:
        devserver: ./plugins/devserver
      target: integrate
      secrets:
        - host.env

  devcontainer:
    build:
      context: ./.devcontainer
      dockerfile: ./Dockerfile
      target: nubox
      args:
        BASE_IMG: mcr.microsoft.com/devcontainers/base:ubuntu24.04@sha256:4bcb1b466771b1ba1ea110e2a27daea2f6093f9527fb75ee59703ec89b5561cb

# host.env is declared by the bayt-emitted compose.integrate.yaml
# fragments (file: ${BAYT_HOST_ENV_FILE}). CI/local callers must
# materialize HOST_ENV to that file before invoking bake (see
# plugins/sayt/integrate.nu for the canonical pattern).
