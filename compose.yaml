services:
  integrate:
    build:
      context: .
      network: host
      dockerfile: ./Dockerfile
      target: integrate
      secrets:
        - host.env
  guis_iris:
    build:
      context: ./guis/iris
      network: host
      dockerfile: ./Dockerfile
      target: release

  services_shelfie:
    build:
      context: .
      network: host
      dockerfile: ./services/shelfie/Dockerfile
      target: integrate
      secrets:
        - host.env
  services_tracker_tx:
    build:
      context: .
      network: host
      dockerfile: ./services/tracker-tx/Dockerfile
      target: integrate
      secrets:
        - host.env
  services_boxer:
    build:
      context: ./services/boxer
      network: host
      dockerfile: ./Dockerfile
      target: release
  plugins_devserver:
    build:
      context: .
      network: host
      dockerfile: ./plugins/devserver/Dockerfile
      target: integrate
      secrets:
        - host.env
  plugins_sayt:
    build:
      context: ./plugins/sayt
      network: host
      dockerfile: ./Dockerfile
      additional_contexts:
        devserver: ./plugins/devserver
      target: integrate
      secrets:
        - host.env

  devcontainer:
    build:
      context: ./.devcontainer
      dockerfile: ./Dockerfile
      target: nubox
      args:
        BASE_IMG: mcr.microsoft.com/devcontainers/base:ubuntu24.04@sha256:4bcb1b466771b1ba1ea110e2a27daea2f6093f9527fb75ee59703ec89b5561cb

secrets:
  host.env:
    environment: HOST_ENV
